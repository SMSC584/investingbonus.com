<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investing.com | Premium Bonus Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --inv-orange: #f39c12;
            --inv-blue: #0b1e33;
            --inv-light-blue: #163152;
            --gold-gradient: linear-gradient(135deg, #f39c12 0%, #ffcc00 100%);
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: radial-gradient(circle at center, #163152 0%, #050c16 100%);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
            overflow: hidden;
        }

        /* ????????????? ??? ? ????????? */
        body::before {
            content: "";
            position: absolute;
            width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.1;
            z-index: -1;
        }

        .header-ui {
            text-align: center;
            margin-bottom: 30px;
            z-index: 10;
        }

        .logo-svg {
            height: 40px;
            fill: white;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 10px rgba(243, 156, 18, 0.5));
        }

        .promo-badge {
            background: var(--inv-orange);
            color: #000;
            padding: 5px 15px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
            display: inline-block;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0;
            font-weight: 200;
            letter-spacing: -1px;
        }

        h1 b { font-weight: 900; color: var(--inv-orange); }

        /* ?????? */
        .wheel-wrapper {
            position: relative;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 100px rgba(0,0,0,0.5);
        }

        .wheel-container {
            position: relative;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            border: 12px solid #050c16;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 0 30px rgba(243, 156, 18, 0.2);
            overflow: hidden;
        }

        #wheel {
            width: 100%;
            height: 100%;
            transition: transform 7s cubic-bezier(0.2, 0, 0.1, 1);
        }

        /* ????????? */
        .pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 45px;
            height: 55px;
            background: #fff;
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 100;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
        }

        /* ??????????? ????????????? ?????? */
        .center-hub {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 90px; height: 90px;
            background: #050c16;
            border: 4px solid var(--inv-orange);
            border-radius: 50%;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(243, 156, 18, 0.6);
            transition: 0.3s;
        }

        .center-hub i {
            font-size: 35px;
            color: var(--inv-orange);
            animation: pulse-gold 2s infinite;
        }

        @keyframes pulse-gold {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        .center-hub:hover { transform: translate(-50%, -50%) scale(1.1); background: var(--inv-orange); }
        .center-hub:hover i { color: #000; }

        /* ?????? Spin */
        #spin-btn {
            margin-top: 40px;
            background: var(--gold-gradient);
            border: none;
            padding: 20px 80px;
            border-radius: 10px;
            color: #000;
            font-size: 1.4rem;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(243, 156, 18, 0.4);
            transition: 0.3s;
            z-index: 10;
        }

        #spin-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(243, 156, 18, 0.6); }
        #spin-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* ????????? ???? ???????? */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 5, 15, 0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .modal-content {
            background: linear-gradient(180deg, #fff 0%, #f0f0f0 100%);
            padding: 60px;
            border-radius: 20px;
            text-align: center;
            color: #000;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 0 100px rgba(243, 156, 18, 0.4);
        }

        .modal-content h2 { font-weight: 900; margin-top: 0; color: #163152; }
        .modal-content .amount { font-size: 5rem; font-weight: 900; color: var(--inv-orange); margin: 20px 0; }
        .modal-content button {
            background: #000; color: #fff; padding: 15px 40px; border: none; border-radius: 5px; 
            font-weight: bold; cursor: pointer; width: 100%; font-size: 1.1rem;
        }

        .show { display: flex; }
    </style>
</head>

        <div class="promo-badge">Limited Time Offer</div>
        <h1>INVESTING<b>.COM</b> EXCLUSIVE</h1>
    </div>

    <div class="wheel-wrapper">
        <div class="pointer"></div>
        <div class="center-hub" onclick="spinWheel()">
            <i class="fas fa-gem"></i>
        </div>
        <div class="wheel-container">
            <canvas id="wheel" width="500" height="500"></canvas>
        </div>
    </div>

    <button id="spin-btn" onclick="spinWheel()">Spin to Win Bonus</button>

    <div id="win-modal" class="modal">
        <div class="modal-content">
            <h2>REWARD UNLOCKED!</h2>
            <div class="amount" id="win-amount">0 EUR</div>
            <p>Your exclusive bonus has been successfully reserved in your Investing.com profile.</p>
            <button onclick="location.reload()">CLAIM MY BONUS</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const btn = document.getElementById('spin-btn');
        const modal = document.getElementById('win-modal');
        const winAmountText = document.getElementById('win-amount');

        const bonuses = ["50 EUR", "75 EUR", "100 EUR", "125 EUR", "150 EUR", "175 EUR", "200 EUR", "90 EUR"];
        const colors = ["#0b1e33", "#163152"];
        const totalSectors = bonuses.length;
        const arc = (2 * Math.PI) / totalSectors;

        let currentRotation = 0;

        function draw() {
            for (let i = 0; i < totalSectors; i++) {
                const angle = i * arc;
                ctx.fillStyle = colors[i % 2];
                ctx.beginPath();
                ctx.moveTo(250, 250);
                ctx.arc(250, 250, 250, angle, angle + arc);
                ctx.fill();

                // ????? ??????????
                ctx.strokeStyle = "rgba(255,255,255,0.1)";
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.save();
                ctx.translate(250, 250);
                ctx.rotate(angle + arc / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = (i % 2 === 0) ? "#f39c12" : "#ffffff";
                ctx.font = "bold 22px Arial";
                ctx.fillText(bonuses[i], 230, 10);
                ctx.restore();
            }
        }

        draw();

        function spinWheel() {
            if (btn.disabled) return;
            btn.disabled = true;

            const targetIndex = Math.floor(Math.random() * totalSectors);
            const targetValue = bonuses[targetIndex];
            
            const degreesPerSlice = 360 / totalSectors;
            const fullSpins = 360 * 10; 
            
            const targetRotation = (targetIndex * degreesPerSlice);
            const landingPoint = 360 - targetRotation - (degreesPerSlice / 2) - 90;
            
            currentRotation += fullSpins + (landingPoint - (currentRotation % 360) + 360) % 360;

            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                winAmountText.innerText = targetValue;
                modal.classList.add('show');
                
                confetti({
                    particleCount: 200,
                    spread: 80,
                    origin: { y: 0.6 },
                    colors: ['#f39c12', '#ffffff', '#163152']
                });
            }, 7200);
        }
    </script>
